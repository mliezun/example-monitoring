name: CI

on:
  push:
    branches:
      - main
      - rewrite-in-rust
  pull_request:
    branches:
      - main
      - rewrite-in-rust

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run e2e tests
        run: docker compose --profile test run --rm --build e2e
