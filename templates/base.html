<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · example-monitoring</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800 bg-slate-900/80">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
      <a href="/" class="text-lg font-semibold tracking-tight text-white">example-monitoring</a>
      {% if user %}
      <nav class="flex items-center gap-4 text-sm">
        <a href="/sites" class="text-slate-300 hover:text-white">Sites</a>
        <a href="/settings" class="text-slate-300 hover:text-white">Notifications</a>
        <span class="text-slate-500">{{ user.username }} · {{ user.org_name }}</span>
        <form method="post" action="/logout">
          <input type="hidden" name="_csrf" value="{{ csrf_token }}">
          <button class="rounded-md border border-slate-700 px-3 py-1 hover:bg-slate-800">Log out</button>
        </form>
      </nav>
      {% endif %}
    </div>
  </header>
  <main class="mx-auto max-w-5xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
