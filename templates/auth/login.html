{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-md">
  <h1 class="text-2xl font-semibold">Log in</h1>
  {% if error %}
  <p class="mt-4 rounded-md border border-red-800 bg-red-950/40 px-3 py-2 text-sm text-red-200">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="mt-6 space-y-4">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <label class="block text-sm">
      <span class="text-slate-400">Username</span>
      <input name="username" required class="mt-1 w-full rounded-md border border-slate-700 bg-slate-900 px-3 py-2">
    </label>
    <label class="block text-sm">
      <span class="text-slate-400">Password</span>
      <input type="password" name="password" required class="mt-1 w-full rounded-md border border-slate-700 bg-slate-900 px-3 py-2">
    </label>
    <button class="w-full rounded-lg bg-emerald-500 py-2 font-medium text-slate-950 hover:bg-emerald-400">Log in</button>
  </form>
  <p class="mt-4 text-sm text-slate-400">No account? <a href="/register" class="text-emerald-400 hover:underline">Register</a></p>
</section>
{% endblock %}
